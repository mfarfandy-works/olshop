<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spesifikasi Produk</title>

<style>

body{
margin:0;
font-family:Segoe UI, sans-serif;
background:#e6e6e6;
}

/* HEADER */
.header{
background:white;
padding:15px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

/* BUTTON HOME */
.home-btn{
background:#5b7688;
color:white;
padding:10px 18px;
text-decoration:none;
border-radius:12px;
font-weight:bold;
}

/* CONTAINER */
.container{
background:white;
margin:15px;
padding:15px;
border-radius:15px;
box-shadow:0 3px 6px rgba(0,0,0,0.2);
}

/* GAMBAR */
.container img{
width:100%;
border-radius:12px;
}

/* JUDUL */
.nama{
font-size:22px;
font-weight:bold;
margin-top:10px;
}

/* DESKRIPSI */
.deskripsi{
color:#555;
margin-top:10px;
line-height:1.5;
}

/* BUTTON BELI */
.beli{
margin-top:15px;
width:100%;
padding:15px;
background:#5b7688;
color:white;
border:none;
border-radius:12px;
font-size:18px;
font-weight:bold;
}

</style>

</head>
<body>

<!-- HEADER -->
<div class="header">
<a href="index.html" class="home-btn">Home</a>
</div>

<!-- ISI PRODUK -->
<div class="container">

<img src="foto produk/jaket adidas.jpeg"
style="
width:100%;
aspect-ratio:1/1;
object-fit:cover;
border-radius:10px;
display:block;
">

<div class="nama">
Jaket Adidas ORI
</div>

<div class="deskripsi">
Warna Hitam, Ukuran M, merk Adidas ORI, warna agak pudar, minus noda coklat di bahu sebelah kanan
</div>

<a href="pembayaran.html"
style="
display:block;
text-align:center;
background:#5b7688;
color:white;
padding:15px;
border-radius:12px;
font-size:18px;
font-weight:bold;
text-decoration:none;
margin-top:15px;
">
Beli Sekarang
</a>

</div>

</body>
</html>
